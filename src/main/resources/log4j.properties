# Log4j Configuration for Selenium Tests
log4j.rootLogger=INFO, consoleAppender, fileAppender

# Console Appender
log4j.appender.consoleAppender=org.apache.log4j.ConsoleAppender
log4j.appender.consoleAppender.layout=org.apache.log4j.PatternLayout
log4j.appender.consoleAppender.layout.ConversionPattern=[%d{yyyy-MM-dd HH:mm:ss}] [%t] [%p] %c - %m%n

# File Appender
log4j.appender.fileAppender=org.apache.log4j.FileAppender
log4j.appender.fileAppender.File=logs/automation-test.log
log4j.appender.fileAppender.layout=org.apache.log4j.PatternLayout
log4j.appender.fileAppender.layout.ConversionPattern=[%d{yyyy-MM-dd HH:mm:ss}] [%t] [%p] %c - %m%n

# Set Log Levels
log4j.logger.com.automation=DEBUG
log4j.logger.org.openqa.selenium=INFO
