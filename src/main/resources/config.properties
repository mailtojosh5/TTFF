# Selenium Configuration Properties

# Browser Configuration
browser=chrome
headless=false
window.maximize=true

# Timeout Configuration (in seconds)
timeout.implicit=10
timeout.explicit=30
timeout.page.load=30

# URLs
base.url=https://opensource-demo.orangehrmlive.com/web/index.php/auth/login
app.url=https://opensource-demo.orangehrmlive.com

# Excel/Test Data
excel.path=tests/BusinessFlow.xlsx
TestCases.sheet=TestCases
Login.sheet=Login
Admin.sheet=Admin
BusinessFlow.sheet=BusinessFlow

# Logging
log.level=INFO
screenshot.on.failure=true
video.recording=false

# Retry
max.retries=2
retry.wait.time=2000

# Allure
allure.results.directory=target/allure-results
allure.report.directory=target/allure-report

# Parallel Execution
parallel.mode=methods
thread.count=3

# Reports
report.type=html,allure
html.report.path=test-results/report.html

# Xray configuration
# Set your Xray Cloud client id and client secret here
xray.client.id=YOUR_XRAY_CLIENT_ID
xray.client.secret=YOUR_XRAY_CLIENT_SECRET
# Base URL for Xray API (example: https://xray.cloud.getxray.app)
# For Xray Cloud use: https://xray.cloud.getxray.app
xray.api.baseurl=https://xray.cloud.getxray.app
